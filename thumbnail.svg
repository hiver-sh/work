<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="'Helvetica Neue', Helvetica, Arial, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <clipPath id="card">
      <rect width="1200" height="400" rx="40"/>
    </clipPath>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="wisp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <radialGradient id="sheen" cx="0.42" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#card)">
    <!-- base cyan-blue -->
    <rect width="1200" height="400" fill="#2b9bee"/>

    <!-- broad tonal bands for the underlying flow -->
    <g filter="url(#soft)" transform="rotate(-30 600 200)">
      <rect x="-1000" y="-360" width="3200" height="360" fill="#c4e9ff"/>
      <rect x="-1000" y="-40"  width="3200" height="240" fill="#6fcbf6"/>
      <rect x="-1000" y="150"  width="3200" height="230" fill="#2b8fe6"/>
      <rect x="-1000" y="340"  width="3200" height="230" fill="#1c74d4"/>
      <rect x="-1000" y="540"  width="3200" height="320" fill="#3f6ee0"/>
    </g>

    <!-- fine wispy streaks: bright highlights + deep-blue shadows, brushed diagonally -->
    <g filter="url(#wisp)" transform="rotate(-30 600 200)">
      <rect x="-1000" y="-150" width="3200" height="10" fill="#f2fbff" opacity="0.65"/>
      <rect x="-1000" y="-110" width="3200" height="30" fill="#d2efff" opacity="0.35"/>
      <rect x="-1000" y="-30"  width="3200" height="7"  fill="#ffffff" opacity="0.55"/>
      <rect x="-1000" y="20"   width="3200" height="46" fill="#8fd8ff" opacity="0.30"/>
      <rect x="-1000" y="95"   width="3200" height="7"  fill="#eaf7ff" opacity="0.55"/>
      <rect x="-1000" y="140"  width="3200" height="34" fill="#1667c2" opacity="0.35"/>
      <rect x="-1000" y="210"  width="3200" height="9"  fill="#d2efff" opacity="0.45"/>
      <rect x="-1000" y="255"  width="3200" height="52" fill="#2b8fe6" opacity="0.30"/>
      <rect x="-1000" y="330"  width="3200" height="6"  fill="#ffffff" opacity="0.50"/>
      <rect x="-1000" y="370"  width="3200" height="36" fill="#0f57b2" opacity="0.40"/>
      <rect x="-1000" y="440"  width="3200" height="10" fill="#c4e9ff" opacity="0.45"/>
      <rect x="-1000" y="485"  width="3200" height="46" fill="#2b82e0" opacity="0.30"/>
      <rect x="-1000" y="560"  width="3200" height="8"  fill="#eaf7ff" opacity="0.40"/>
      <rect x="-1000" y="600"  width="3200" height="40" fill="#3f6ee0" opacity="0.30"/>
    </g>

    <!-- soft green glow drifting in from the lower-left corner -->
    <g filter="url(#soft)">
      <ellipse cx="70" cy="420" rx="320" ry="210" fill="#a9dc86" opacity="0.85"/>
      <ellipse cx="150" cy="370" rx="210" ry="150" fill="#7fd0b0" opacity="0.55"/>
    </g>

    <!-- overall sheen -->
    <rect width="1200" height="400" fill="url(#sheen)"/>
  </g>

